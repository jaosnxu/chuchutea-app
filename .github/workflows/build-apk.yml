name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Setup JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          packages: 'platforms;android-34 build-tools;34.0.0 ndk;27.3.13750724 cmake;3.22.1 platform-tools'

      - name: Install deps
        run: npm ci --legacy-peer-deps 2>&1 || npm install --legacy-peer-deps 2>&1

      - name: Disable New Architecture
        run: |
          grep -q "newArchEnabled=true" android/gradle.properties && sed -i 's/newArchEnabled=true/newArchEnabled=false/' android/gradle.properties || echo "newArchEnabled=false" >> android/gradle.properties

      - name: Build APK
        run: |
          cd android
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon --warning-mode all --stacktrace 2>&1

      - name: Upload APK
        if: success()
        uses: actions/upload-artifact@v4
        with:
          name: CHUCHUTEA-APK
          path: android/app/build/outputs/apk/release/*.apk
