name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Install npm dependencies
        run: npm install

      - name: Disable new arch
        run: sed -i 's/newArchEnabled=true/newArchEnabled=false/' android/gradle.properties

      - name: Build Release APK
        run: |
          export ANDROID_HOME=$ANDROID_HOME
          echo "ANDROID_HOME=$ANDROID_HOME"
          echo "sdk.dir=$ANDROID_HOME" > android/local.properties
          yes | $ANDROID_HOME/cmdline-tools/latest/bin/sdkmanager --licenses 2>/dev/null || true
          cd android && ./gradlew assembleRelease --no-daemon --stacktrace

      - name: Verify APK exists
        run: ls -la android/app/build/outputs/apk/release/

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: CHUCHUTEA-release
          path: android/app/build/outputs/apk/release/*.apk
          retention-days: 30
